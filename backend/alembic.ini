[alembic]
# Path to migration scripts (relative to this file / the backend dir).
script_location = alembic

# Make the `app` package importable when running alembic from backend/.
prepend_sys_path = .

# Use OS-native path separators for version files.
version_path_separator = os

# NOTE: sqlalchemy.url is intentionally left blank here.
# It is injected in alembic/env.py from app.config.settings.DATABASE_URL
# so DB credentials stay in .env and are never committed.
sqlalchemy.url =


# ------------------------------------------------------------------------- #
# Logging
# ------------------------------------------------------------------------- #
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
